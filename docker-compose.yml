version: "3.9"

# LeadPilot demo - production deployment.
# 2 services orchestrated:
#   - leadpilot (Next.js frontend on host port 3004, basePath /offers/leadpilot/demo)
#   - leadpilot-backend (FastAPI + SQLite, internal only on 8000)
# Shared external network wkdemo-net (created once by deploy.yml) avoids
# Docker default address-pool exhaustion across all LP stacks.

services:
  leadpilot-backend:
    image: ghcr.io/wikolabs/leadpilot-backend:latest
    container_name: leadpilot-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "sqlite:////data/leadpilot.db"
    volumes:
      - lp_data:/data
    networks:
      wkdemo_net:
        aliases:
          - backend

  leadpilot:
    image: ghcr.io/wikolabs/leadpilot:latest
    container_name: leadpilot
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      BACKEND_URL: "http://leadpilot-backend:8000"
    depends_on:
      - leadpilot-backend
    networks:
      - wkdemo_net

volumes:
  lp_data:

networks:
  wkdemo_net:
    name: wkdemo-net
    external: true
